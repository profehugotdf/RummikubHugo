<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Rummikub</title>
<style>
  :root { color-scheme: light only; }
  body { font-family: sans-serif; margin:0; padding:10px; background:#1b3d1b; color:#eee; font-size:16px; }
  h2 { margin:6px 0; }
  textarea { width:100%; height:70px; font-size:13px; box-sizing:border-box; margin:6px 0; background:#fff !important; color:#000 !important; }
  button { padding:12px; margin:6px 0; width:100%; font-size:16px; border-radius:8px; border:none; background:#4caf50; color:white; }
  button:disabled { background:#777; opacity:.6; }
  .paso { background:#2a5a2a; padding:12px; border-radius:10px; margin:8px 0; }
  .titulo { font-weight:bold; font-size:17px; margin-bottom:4px; color:#fff; }
  .oculto { display:none; }
  #log { background:#000; color:#0f0; padding:8px; font-size:12px; min-height:34px; border-radius:8px; white-space:pre-wrap; max-height:70px; overflow-y:auto; }
  .rol { font-size:18px; padding:16px; }
  #estadoTurno { font-weight:bold; font-size:18px; text-align:center; padding:8px; border-radius:8px; margin:6px 0; }
  .miTurno { background:#2e7d32; }
  .turnoRival { background:#8a5a00; }
  .botonera { display:flex; gap:8px; }
  .botonera button { margin:6px 0; }
  #btnDeshacer { background:#c0392b; }
  #aviso { background:#1565c0; color:#fff; padding:10px; border-radius:8px; margin:8px 0; }

  #mano { display:flex; flex-wrap:wrap; gap:5px; background:#0d260d; padding:8px; border-radius:10px; min-height:60px; }
  #tablero { display:grid; grid-template-columns:repeat(8, 1fr); gap:4px; background:#0d3d0d; padding:8px; border-radius:10px; min-height:130px; }
  .celda { aspect-ratio:3/4; background:rgba(255,255,255,.06); border-radius:6px; }
  .ficha { width:100%; height:100%; min-width:38px; min-height:52px; background:#f5f0e1 !important; border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:20px; box-shadow:0 2px 3px rgba(0,0,0,.4); touch-action:none; user-select:none; }
  #mano .ficha { width:42px; height:56px; }
  .c-rojo{color:#d21b1b !important;} .c-azul{color:#1b52d2 !important;} .c-negro{color:#111 !important;} .c-naranja{color:#e08a00 !important;}
  .comodin{ color:#c0392b !important; font-size:24px; }
  .arrastrando { opacity:.5; }
  .celda.resaltada { background:rgba(255,255,0,.35); }
  .celda.replay { background:rgba(0,150,255,.4); }
  .bloqueado { pointer-events:none; opacity:.85; }
</style>
</head>
<body>
  <h2>Rummikub</h2>

  <div id="aviso" class="oculto"></div>

  <div id="elegirRol" class="paso">
    <div class="titulo">¿Quién sos?</div>
    <button class="rol" onclick="soyA()">Soy el ANFITRIÓN (reparto yo)</button>
    <button class="rol" onclick="soyB()">Me UNO a la partida</button>
    <button id="btnReconectar" class="oculto" style="background:#1565c0" onclick="reconectar()">Reconectar (recuperé una partida)</button>
  </div>

  <div id="flujoA" class="oculto">
    <div class="paso">
      <div class="titulo">Paso 1 — Tu invitación</div>
      <div>Copiala y mandala por WhatsApp:</div>
      <textarea id="ofertaOut" readonly></textarea>
      <button onclick="copiar('ofertaOut')">Copiar invitación</button>
    </div>
    <div class="paso">
      <div class="titulo">Paso 2 — Su respuesta</div>
      <textarea id="respuestaIn" placeholder="Pegá acá la respuesta"></textarea>
      <button onclick="confirmarA()">Conectar</button>
    </div>
  </div>

  <div id="flujoB" class="oculto">
    <div class="paso">
      <div class="titulo">Paso 1 — La invitación</div>
      <textarea id="ofertaIn" placeholder="Pegá acá la invitación"></textarea>
      <button onclick="unirseB()">Generar mi respuesta</button>
    </div>
    <div id="pasoBResp" class="paso oculto">
      <div class="titulo">Paso 2 — Tu respuesta</div>
      <textarea id="respuestaOut" readonly></textarea>
      <button onclick="copiar('respuestaOut')">Copiar respuesta</button>
    </div>
  </div>

  <div id="zonaEstado" class="oculto paso">
    <div id="log">Esperando conexión...</div>
  </div>

  <div id="zonaJuego" class="oculto">
    <div id="estadoTurno"></div>
    <div class="paso">
      <div class="titulo">Tablero común</div>
      <div id="tablero"></div>
    </div>
    <div class="paso">
      <div class="titulo">Tu mano (<span id="cuenta">0</span>) · Pozo: <span id="pozo">0</span></div>
      <div id="mano"></div>
      <div class="botonera">
        <button id="btnDeshacer" onclick="deshacer()">Deshacer</button>
        <button id="btnEnviar" onclick="enviarJugada()">Enviar jugada</button>
      </div>
      <button id="btnRobar" onclick="robar()">Robar del pozo y pasar</button>
    </div>
  </div>

<script>
/* ---------- Persistencia ---------- */
const CLAVE = "rummikub_estado";
function guardar() {
  const estado = { miMano, fichasEnPozo, tablero, esMiTurno, esAnfitrion, hayJuego:true };
  try { localStorage.setItem(CLAVE, JSON.stringify(estado)); } catch(e){}
}
function cargarGuardado() {
  try { const s = localStorage.getItem(CLAVE); return s ? JSON.parse(s) : null; } catch(e){ return null; }
}
function borrarGuardado() { try { localStorage.removeItem(CLAVE); } catch(e){} }

/* ---------- Conexión P2P ---------- */
let pc, dataChannel, esAnfitrion = false;
const $ = (id) => document.getElementById(id);
function log(t){ const l=$('log'); l.textContent += "\n" + t; l.scrollTop = l.scrollHeight; }
function setLog(t){ $('log').textContent = t; }
function mostrarAviso(t){ const a=$('aviso'); a.textContent=t; a.classList.remove('oculto'); }

function crearPC() {
  pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
  let listo = false;
  const terminar = () => {
    if (listo) return; listo = true;
    const code = btoa(JSON.stringify(pc.localDescription));
    if (esAnfitrion) $('ofertaOut').value = code; else $('respuestaOut').value = code;
  };
  pc.onicecandidate = (e) => { if (e.candidate === null) terminar(); };
  setTimeout(terminar, 3000);
}
function usarCanal(dc) {
  dataChannel = dc;
  dc.onopen = () => {
    ['elegirRol','flujoA','flujoB'].forEach(id => $(id).classList.add('oculto'));
    $('zonaEstado').classList.remove('oculto');
    $('zonaJuego').classList.remove('oculto');
    setLog("✅ ¡Conectado!");
    if (esAnfitrion && !recuperado) repartir();
    else { render(); actualizarUI(); }
  };
  dc.onmessage = (e) => manejarMensaje(JSON.parse(e.data));
  dc.onclose = () => { log("❌ Canal cerrado."); mostrarAviso("Se cortó la conexión. Recargá y tocá 'Reconectar' para seguir la partida."); };
}
function enviar(obj) {
  if (dataChannel && dataChannel.readyState === "open") dataChannel.send(JSON.stringify(obj));
}

function soyA() {
  esAnfitrion = true; $('elegirRol').classList.add('oculto'); $('flujoA').classList.remove('oculto');
  crearPC(); usarCanal(pc.createDataChannel("juego"));
  pc.createOffer().then(o => pc.setLocalDescription(o));
}
function soyB() { $('elegirRol').classList.add('oculto'); $('flujoB').classList.remove('oculto'); }
async function unirseB() {
  const txt = $('ofertaIn').value.trim(); if (!txt) { alert("Pegá la invitación"); return; }
  crearPC(); pc.ondatachannel = (e) => usarCanal(e.channel);
  await pc.setRemoteDescription(JSON.parse(atob(txt)));
  const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
  $('pasoBResp').classList.remove('oculto');
}
async function confirmarA() {
  const txt = $('respuestaIn').value.trim(); if (!txt) { alert("Pegá la respuesta"); return; }
  await pc.setRemoteDescription(JSON.parse(atob(txt)));
}
function copiar(id) { const el=$(id); el.select(); navigator.clipboard.writeText(el.value)
  .then(()=>alert("¡Copiado!"), ()=>{document.execCommand('copy');alert("¡Copiado!");}); }

function reconectar() {
  const g = cargarGuardado();
  if (!g) { alert("No hay partida guardada"); return; }
  if (g.esAnfitrion) soyA(); else soyB();
}

/* ---------- Estado del juego ---------- */
const COLORES = ["rojo","azul","negro","naranja"];
const CELDAS_TABLERO = 32;
const VEL_REPLAY = 400;

let miMano = [], fichasEnPozo = 0;
let tablero = new Array(CELDAS_TABLERO).fill(null);
let esMiTurno = false;
let reproduciendo = false;
let recuperado = false;

let manoInicioTurno = null, tableroInicioTurno = null;
let movimientos = [];

function crearMazo() {
  const mazo = []; let id = 0;
  for (let c = 0; c < 2; c++)
    for (const color of COLORES)
      for (let num = 1; num <= 13; num++) mazo.push({ id:id++, num, color });
  mazo.push({ id:id++, comodin:true }); mazo.push({ id:id++, comodin:true });
  return mazo;
}
function mezclar(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function repartir() {
  const mazo = mezclar(crearMazo());
  const manoA = mazo.splice(0,14);
  const manoB = mazo.splice(0,14);
  fichasEnPozo = mazo.length;
  const anfitrionEmpieza = Math.random() < 0.5;
  enviar({ tipo:"reparto", mano:manoB, pozo:fichasEnPozo, rivalEmpieza: anfitrionEmpieza });
  miMano = manoA;
  esMiTurno = anfitrionEmpieza;
  iniciarTurnoSiCorresponde();
  render(); actualizarUI(); guardar();
}

function manejarMensaje(msg) {
  if (msg.tipo === "reparto") {
    miMano = msg.mano; fichasEnPozo = msg.pozo;
    esMiTurno = msg.rivalEmpieza;
    iniciarTurnoSiCorresponde();
    render(); actualizarUI(); guardar();
  } else if (msg.tipo === "jugada") {
    reproducirJugada(msg);
  }
}

function iniciarTurnoSiCorresponde() {
  if (esMiTurno) {
    manoInicioTurno = JSON.parse(JSON.stringify(miMano));
    tableroInicioTurno = JSON.parse(JSON.stringify(tablero));
    movimientos = [];
  }
}

/* ---------- Turno del jugador ---------- */
function deshacer() {
  if (!esMiTurno) return;
  miMano = JSON.parse(JSON.stringify(manoInicioTurno));
  tablero = JSON.parse(JSON.stringify(tableroInicioTurno));
  movimientos = [];
  render(); guardar();
}
function enviarJugada() {
  if (!esMiTurno) return;
  enviar({ tipo:"jugada", tablero:tablero, mano:miMano.length, pozo:fichasEnPozo, movimientos });
  esMiTurno = false;
  actualizarUI(); guardar();
}
function robar() {
  if (!esMiTurno) return;
  if (fichasEnPozo <= 0) { alert("El pozo está vacío"); return; }
  fichasEnPozo--;
  tablero = JSON.parse(JSON.stringify(tableroInicioTurno));
  miMano = JSON.parse(JSON.stringify(manoInicioTurno));
  enviar({ tipo:"jugada", tablero:tablero, mano:miMano.length, pozo:fichasEnPozo, movimientos:[], robo:true });
  esMiTurno = false;
  render(); actualizarUI(); guardar();
}

/* ---------- Reproducir jugada del rival ---------- */
async function reproducirJugada(msg) {
  reproduciendo = true; actualizarUI();
  const movs = msg.movimientos || [];
  for (const m of movs) {
    aplicarMovimientoVisual(m);
    const celda = document.querySelector('.celda[data-celda="'+m.destino+'"]');
    if (celda) celda.classList.add("replay");
    await esperar(VEL_REPLAY);
    if (celda) celda.classList.remove("replay");
  }
  tablero = msg.tablero;
  fichasEnPozo = msg.pozo;
  reproduciendo = false;
  esMiTurno = true;
  iniciarTurnoSiCorresponde();
  render(); actualizarUI(); guardar();
}
function aplicarMovimientoVisual(m) {
  if (m.origenTablero != null) tablero[m.origenTablero] = null;
  if (m.destino != null) tablero[m.destino] = m.ficha;
  renderTablero();
}
function esperar(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ---------- UI ---------- */
function actualizarUI() {
  const et = $('estadoTurno');
  if (reproduciendo) { et.textContent = "👀 Mirando la jugada del rival..."; et.className = "turnoRival"; }
  else if (esMiTurno) { et.textContent = "🟢 Tu turno"; et.className = "miTurno"; }
  else { et.textContent = "⏳ Turno del rival"; et.className = "turnoRival"; }
  const bloq = !esMiTurno || reproduciendo;
  $('btnDeshacer').disabled = bloq;
  $('btnEnviar').disabled = bloq;
  $('btnRobar').disabled = bloq;
  $('tablero').classList.toggle('bloqueado', bloq);
  $('mano').classList.toggle('bloqueado', bloq);
}

/* ---------- Render ---------- */
function ordenarMano() {
  miMano.sort((a,b)=>{ if(a.comodin)return 1; if(b.comodin)return -1;
    if(a.color!==b.color)return COLORES.indexOf(a.color)-COLORES.indexOf(b.color); return a.num-b.num; });
}
function crearFichaDiv(f) {
  const div = document.createElement("div");
  div.className = "ficha";
  if (f.comodin){ div.classList.add("comodin"); div.textContent="★"; }
  else { div.classList.add("c-"+f.color); div.textContent=f.num; }
  div.dataset.fid = f.id;
  hacerArrastrable(div, f);
  return div;
}
function render(){ renderMano(); renderTablero(); }
function renderMano() {
  ordenarMano();
  const cont=$('mano'); cont.innerHTML="";
  for(const f of miMano){ const d=crearFichaDiv(f); d.dataset.origen="mano"; cont.appendChild(d); }
  $('cuenta').textContent = miMano.length;
  $('pozo').textContent = fichasEnPozo;
}
function renderTablero() {
  const cont=$('tablero'); cont.innerHTML="";
  for(let i=0;i<CELDAS_TABLERO;i++){
    const celda=document.createElement("div");
    celda.className="celda"; celda.dataset.celda=i;
    const f=tablero[i];
    if(f){ const d=crearFichaDiv(f); d.dataset.origen="tablero"; d.dataset.celdaOrigen=i; celda.appendChild(d); }
    cont.appendChild(celda);
  }
}

/* ---------- Arrastre ---------- */
let arrastre = null;
function hacerArrastrable(div, ficha) {
  div.addEventListener("pointerdown", (e) => {
    if (!esMiTurno || reproduciendo) return;
    e.preventDefault();
    const rect = div.getBoundingClientRect();
    const fantasma = div.cloneNode(true);
    fantasma.style.position="fixed"; fantasma.style.zIndex=1000; fantasma.style.pointerEvents="none";
    fantasma.style.width=rect.width+"px"; fantasma.style.height=rect.height+"px";
    fantasma.style.left=rect.left+"px"; fantasma.style.top=rect.top+"px";
    document.body.appendChild(fantasma);
    div.classList.add("arrastrando");
    arrastre = { ficha, div, fantasma, offX:e.clientX-rect.left, offY:e.clientY-rect.top,
                 origen:div.dataset.origen, celdaOrigen:div.dataset.celdaOrigen };
    div.setPointerCapture(e.pointerId);
  });
  div.addEventListener("pointermove", (e) => {
    if(!arrastre) return;
    arrastre.fantasma.style.left=(e.clientX-arrastre.offX)+"px";
    arrastre.fantasma.style.top=(e.clientY-arrastre.offY)+"px";
    document.querySelectorAll(".celda.resaltada").forEach(c=>c.classList.remove("resaltada"));
    const celda = celdaBajoPunto(e.clientX, e.clientY);
    if(celda) celda.classList.add("resaltada");
  });
  div.addEventListener("pointerup", (e) => {
    if(!arrastre) return;
    const celda = celdaBajoPunto(e.clientX, e.clientY);
    const sobreMano = elementoBajoPuntoEsMano(e.clientX, e.clientY);
    arrastre.fantasma.remove();
    arrastre.div.classList.remove("arrastrando");
    document.querySelectorAll(".celda.resaltada").forEach(c=>c.classList.remove("resaltada"));
    if(celda) soltarEnCelda(parseInt(celda.dataset.celda));
    else if(sobreMano) soltarEnMano();
    arrastre = null;
  });
}
function celdaBajoPunto(x,y){ const el=document.elementFromPoint(x,y); return el ? el.closest(".celda") : null; }
function elementoBajoPuntoEsMano(x,y){ const el=document.elementFromPoint(x,y); return el ? el.closest("#mano") : null; }

function soltarEnCelda(destino) {
  if (tablero[destino]) return;
  const f = arrastre.ficha;
  if (arrastre.origen === "mano") {
    miMano = miMano.filter(x => x.id !== f.id);
    tablero[destino] = f;
    movimientos.push({ ficha:f, destino, desdeMano:true });
  } else {
    const orig = parseInt(arrastre.celdaOrigen);
    tablero[orig] = null;
    tablero[destino] = f;
    movimientos.push({ ficha:f, destino, origenTablero:orig });
  }
  render(); guardar();
}
function soltarEnMano() {
  if (arrastre.origen !== "tablero") return;
  const f = arrastre.ficha;
  const orig = parseInt(arrastre.celdaOrigen);
  tablero[orig] = null;
  miMano.push(f);
  movimientos.push({ ficha:f, aMano:true, origenTablero:orig });
  render(); guardar();
}

/* ---------- Avisar antes de recargar/cerrar si hay partida ---------- */
window.addEventListener("beforeunload", (e) => {
  const g = cargarGuardado();
  if (g && g.hayJuego) {
    e.preventDefault();
    e.returnValue = "";
  }
});

/* ---------- Al cargar la página ---------- */
window.addEventListener("load", () => {
  const g = cargarGuardado();
  if (g && g.hayJuego) {
    miMano = g.miMano; fichasEnPozo = g.fichasEnPozo; tablero = g.tablero;
    esMiTurno = g.esMiTurno; esAnfitrion = g.esAnfitrion; recuperado = true;
    manoInicioTurno = JSON.parse(JSON.stringify(miMano));
    tableroInicioTurno = JSON.parse(JSON.stringify(tablero));
    mostrarAviso("Se recuperó tu partida. Tocá 'Reconectar' para volver a unirte con tu compañero.");
    $('btnReconectar').classList.remove('oculto');
  }
});
</script>
</body>
</html>
